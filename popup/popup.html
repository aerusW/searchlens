<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="sl-header">
    <img src="../icons/icon-48.png" class="sl-logo" alt="">
    <span class="sl-title">SearchLens</span>
  </header>
  <section class="sl-section">
    <label class="sl-toggle-row">
      <span>Hide sponsored</span>
      <span class="sl-switch">
        <input type="checkbox" id="hideSponsored">
        <span class="sl-slider"></span>
      </span>
    </label>
  </section>
  <section class="sl-section">
    <label class="sl-toggle-row">
      <span>Show images</span>
      <span class="sl-switch">
        <input type="checkbox" id="showImages">
        <span class="sl-slider"></span>
      </span>
    </label>
  </section>
  <section class="sl-section">
    <div class="sl-label">File type <span style="color:#444;font-size:10px;text-transform:none;letter-spacing:0">(show only)</span></div>
    <div class="sl-chips" id="filetypeChips">
      <label class="sl-chip"><input type="checkbox" value="pdf"> PDF</label>
      <label class="sl-chip"><input type="checkbox" value="doc"> DOC</label>
      <label class="sl-chip"><input type="checkbox" value="xls"> XLS</label>
      <label class="sl-chip"><input type="checkbox" value="ppt"> PPT</label>
      <label class="sl-chip"><input type="checkbox" value="txt"> TXT</label>
      <label class="sl-chip"><input type="checkbox" value="csv"> CSV</label>
    </div>
  </section>
  <section class="sl-section">
    <label class="sl-label" for="language">Language</label>
    <select id="language" class="sl-select">
      <option value="">Any</option>
      <option value="en">English</option>
      <option value="it">Italian</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="nl">Dutch</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
    </select>
  </section>
  <section class="sl-section">
    <div class="sl-label">Domain <span style="color:#444;font-size:10px;text-transform:none;letter-spacing:0">(show only)</span></div>
    <div class="sl-chips" id="domainChips"></div>
    <div class="sl-add-row">
      <input type="text" id="domainInput" class="sl-input" placeholder=".com, .it …">
      <button id="domainAdd" class="sl-btn-add">+</button>
    </div>
  </section>
  <!-- sections added by feature branches -->
  <script src="popup.js"></script>
</body>
</html>
